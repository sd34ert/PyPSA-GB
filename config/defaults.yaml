# ══════════════════════════════════════════════════════════════════════════════
# PyPSA-GB Default Configuration
# ══════════════════════════════════════════════════════════════════════════════
# This file defines DEFAULT values inherited by all scenarios.
# Scenarios in scenarios.yaml only need to specify values that DIFFER from these.
# ══════════════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────────────
# TIME & RESOLUTION
# ──────────────────────────────────────────────────────────────────────────────
timestep_minutes: 60              # 60 = hourly, 30 = half-hourly
voll: 6000.0                      # Value of Lost Load (£/MWh)

# ──────────────────────────────────────────────────────────────────────────────
# CLUSTERING (disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
clustering:
  enabled: false
  aggregate_components:
    enabled: false
    include_storage_units: false      # Aggregate storage units when possible
    include_loads: false               # Aggregate loads per bus after clustering
    include_stores: false           # Aggregate Store components (rarely used)

# ──────────────────────────────────────────────────────────────────────────────
# TRANSMISSION CONSTRAINTS
# ──────────────────────────────────────────────────────────────────────────────
# For detailed networks (ETYS), actual line ratings may be too restrictive.
# These settings allow relaxing transmission constraints for feasibility.
transmission:
  # Minimum line capacity in MVA (lines below this are set to this value)
  min_line_s_nom: 0               # 0 = use actual ratings
  # Minimum transformer capacity in MVA
  min_transformer_s_nom: 0        # 0 = use actual ratings
  # Scaling factor for all line/transformer capacities (1.0 = no change)
  capacity_scale: 1.0             # 1.0 = no scaling (use clustering instead)

# ──────────────────────────────────────────────────────────────────────────────
# ETYS NETWORK UPGRADES (ETYS network model only)
# ──────────────────────────────────────────────────────────────────────────────
# Applies planned network infrastructure upgrades from ETYS Appendix B 2023.
# Includes circuit additions/removals, transformer changes, and new HVDC links.
# Only applies when network_model: "ETYS"
etys_upgrades:
  enabled: true                  # Set false to not apply network upgrades
  # Year through which to apply upgrades (null = use modelled_year)
  # Example: If modelled_year is 2035, apply all upgrades through 2035
  upgrade_year: null              # null, or specific year like 2030

# ──────────────────────────────────────────────────────────────────────────────
# DEMAND DATA SOURCES
# ──────────────────────────────────────────────────────────────────────────────
# Temporal profile source for demand (annual totals always from FES for future scenarios)
# Options:
#   "ESPENI"    - Historical half-hourly GB demand (recommended, uses demand_year)
#   "eload"     - eLOAD model hourly profile (2010 or 2050 via profile_year)
#   "desstinee" - DESSTINEE model hourly profile (2010 or 2050 via profile_year)
#
# For eload/desstinee, profile_year auto-selects (2050 if modelled_year >= 2040, else 2010)
demand_timeseries: "ESPENI"

# ──────────────────────────────────────────────────────────────────────────────
# SHARED PATH TEMPLATES
# ──────────────────────────────────────────────────────────────────────────────
# Use this section for cross-cutting mutable input paths that are reused across
# scripts/rules. Keep subsystem-specific path config where it already exists.
paths:
  fes:
    data_template: "resources/FES/FES_{year}_data.csv"
    processed_template: "resources/FES/FES_{year}_processed.csv"
    api_urls_yaml: "data/FES/FES_api_urls.yaml"
  hydrogen:
    demand_supply_distribution_workbook: "data/hydrogen/demand_supply_distribution.xlsx"

# ═══════════════════════════════════════════════════════════════════
# LAND CONSTRAINTS — Unified Configuration
# ═══════════════════════════════════════════════════════════════════

land_constraints:
  enabled: true              # Global defaults-driven GIS policy for the land workflow
  min_modelled_year: 2025    # Informational guard for compatible future scenarios
  supported_network_models: ["zonal"]  # Shared land outputs are currently only built for these models

  # ── SHARED FOUNDATION SETTINGS ──────────────────────────────────
  foundation:
    resolution: 100          # metres (raster processing resolution)
    target_crs: 27700        # EPSG code for all raster processing (OSGB36)
    source_crs: 27700        # EPSG code of most GB data (OSGB36)


  # ── ONSHORE WIND ────────────────────────────────────────────────
  onwind:
    protected_tiers:                     # Hard exclusion (true) or skip (false) per tier
      tier1: true                        # SAC/SPA/Ramsar/SSSI (excluding marine)
      tier2: true                        # AONB/NatParks/NSA
      tier3: true                        # Irreplaceable habitats
      tier4: true                       # Historic environment
    land_cover:                          # UK LCM 2024 habitat class codes (1–21)
      exclusion_codes: [13, 14, 20, 21]  # Saltwater, Freshwater, Urban, Suburban
    flooding:
      enabled: true                      # Flood Zones 2, 3
    coastal_change:
      enabled: true
    groundwater_protection:              # England & Wales only
      exclusion_zones: 1                 # SPZ zones to exclude (1→Band 1)
    airfield:
      mod: true                          # MoD aerodromes FRZ exclusion zone
      civil: true                        # Civil protected aerodromes FRZ exclusion zone
    alc_bmv:
      enabled: false                     # BMV agricultural land (Grades 1, 2, 3a)
    green_belt:
      enabled: false                     # Green Belt land (England & Scotland)
    capacity_density: 3.0                # MW/km²

  # ── OFFSHORE WIND (FIXED) ───────────────────────────────────────
  # `capacity_density` is active in the current workflow.
  # Other offshore siting keys are reserved for future filtering and are
  # validated/documented but not yet enforced by the active DAG.
  offwind-ac:
    min_depth: 10                      # m
    max_depth: 70                      # m
    min_shore_distance: 10000          # m
    max_shore_distance: 50000          # m
    kra_lease_area: true               # must be sited within KRA/SMP region
    capacity_density: 4.0              # MW/km²

  offwind-dc:
    min_depth: 10                      # m
    max_depth: 70                      # m
    min_shore_distance: 50000          # m
    kra_lease_area: true               # must be sited within KRA/SMP region
    capacity_density: 3.0              # MW/km²

  # ── OFFSHORE WIND (FLOATING) ────────────────────────────────────
  offwind-float:
    min_depth: 50                      # m
    min_shore_distance: 10000          # m
    kra_lease_area: true               # must be sited within KRA/SMP region
    capacity_density:
      ac: 3.0                          # MW/km², distance to shore < 50km
      dc: 2.0                          # MW/km², distance to shore => 50km

  # ── GROUND-MOUNTED SOLAR ────────────────────────────────────────
  solar:
    protected_tiers:                     # Hard exclusion (true) or skip (false) per tier
      tier1: true                        # SAC/SPA/Ramsar/SSSI (excluding marine)
      tier2: true                        # AONB/NatParks/NSA
      tier3: true                        # Irreplaceable habitats
      tier4: true                        # Historic environment
    land_cover:                          # UK LCM 2024 habitat class codes (1–21)
      exclusion_codes: [13, 14, 20, 21]  # Saltwater, Freshwater, Urban, Suburban
    flooding:
      enabled: true                      # Flood Zones 2, 3
    coastal_change:
      enabled: false
    groundwater_protection:              # England & Wales only
      exclusion_zones: 1                 # SPZ zones to exclude (1→Band 1)
    airfield:
      mod: true                          # MoD aerodromes FRZ exclusion zone
      civil: false                       # Civil protected aerodromes FRZ exclusion zone
    alc_bmv:
      enabled: true                      # Hard constraint: BMV agricultural land (Grades 1, 2, 3a)
    green_belt:
      enabled: true                      # Hard constraint: Green Belt land (England & Scotland)
    capacity_density: 50.0               # MW/km²

# ═══════════════════════════════════════════════════════════════════
# GENERATOR SITING CONSTRAINTS
# ═══════════════════════════════════════════════════════════════════

nuclear:
  future_fixed:
    exclude_scotland: false         # When true, remove fixed future nuclear in Scottish zones and renormalize the GB remainder
  existing_asset_overrides:
    retain_sites: []                # Optional site-name patterns to retain beyond normal phase-out filtering
  siting_constraints:
    enabled: true
    scotland_ban: true                 # nuclear banned from Scotland

    large_nuclear:
      en6_sites_only: true
      max_per_site_mw: 3400
      scotland_ban: true

    smr:
      enabled: true
      scotland_ban: false
      allowed_anchor_ids: []           # Empty list = allow all eligible anchors after siting / land filtering
      preserve_non_scottish_baseline: false  # When true, keep non-Scottish SMR anchor headroom unchanged and add Scottish anchors as extra local options
      protected_tiers:                 # Hard exclusion (true) or skip (false) per tier
        tier1: true                    # SAC/SPA/Ramsar/SSSI (excluding marine)
        tier2: true                    # AONB/NatParks/NSA
        tier3: true                    # Irreplaceable habitats
        tier4: true                    # Historic environment
      land_cover:                      # UK LCM 2024 habitat class codes (1–21)
        exclusion_codes: [13, 14, 20, 21]  # Saltwater, Freshwater, Urban, Suburban
      pop_density_criterion:
        enabled: true
      airfield_frz:
        enabled: true
      groundwater_protection:          # England & Wales only
        exclusion_zones: [1, 2]        # SPZ zones to exclude (1→Band 1, 2/3→Band 2)
      gas_pipe:
        enabled: true
        buffer: 100                    # m — buffer around high-pressure gas pipelines
      comah:
        enabled: true
        buffer: 3000                   # m — buffer around COMAH Upper Tier sites
      alc_bmv:
        enabled: true                  # Soft constraint: BMV agricultural land
      green_belt:
        enabled: true                  # Soft constraint: Green Belt land
      coastal_change_buffer: 3000      # m
      flood_zones_enabled: true        # Flood zones 2 and 3
      cooling_options: [once-through, evaporative, hybrid, dry-cooling]
      cooling_water_source: [freshwater, wastewater, tidal, seawater]
      water_constraint:
        enabled: false                 # When false, all zones pass water availability
      capacity_density: 300.0          # MW/km² — compact site-level density for anchor-based SMR land aggregation
      min_site_area: 1                   # min site area sqkm
      zone_threshold: 0.0                # SMR uses contiguous-site filtering; do not zero zones again by coarse zonal share

# Reactor metadata scaffolding for nuclear-to-hydrogen and later heat use.
# This does not yet change dispatch by itself; it annotates nuclear generators
# so later solve-time heat extraction and nuclear-to-x coupling can reuse a
# stable schema without refactoring the generator integration stage.
nuclear_technologies:
  default:
    reactor_class: "Generic"
    thermal_efficiency: 0.33
    heat_extraction_max_low_fraction: 0.15
    heat_extraction_max_high_fraction: 0.20
    power_loss_per_mwth_low: 0.10
    power_loss_per_mwth_high: 0.15
    min_stable_fraction: 0.40
  carriers:
    nuclear:
      reactor_class: "PWR"
    PWR:
      reactor_class: "PWR"
    AGR:
      reactor_class: "AGR"
    BWR:
      reactor_class: "BWR"
    AMR:
      reactor_class: "AMR"
    SMR:
      reactor_class: "SMR"
    smr:
      reactor_class: "SMR"

# Nuclear-to-x solve-time interface scaffold.
# Current active use:
# - keeps a stable config surface for nuclear-to-hydrogen work
# - enables the no-op solve hook used to preserve a future heat-coupling interface
# Not yet active:
# - explicit heat-extraction constraints
# - district heat / industrial heat subsystems
# - HTE / thermochemical coupling constraints
nuclear_to_x:
  enabled: false
  hydrogen:
    enabled: true
    pathway: "lte"
    heat_coupling_scaffold: true

ccs: #tocode : Add CCS-specific siting constraints (e.g. proximity to storage sites, CO2 transport infrastructure)
  siting_constraints:
    enabled: false

# ═══════════════════════════════════════════════════════════════════
# HYDROGEN SITING CONSTRAINTS
# ═══════════════════════════════════════════════════════════════════

hydrogen:
  network:
    mode: "full"                         # Options: "full" (repo-local topology), "copperplate"
    topology:
      buses_path: "data/hydrogen/topology/buses.csv"
      links_path: "data/hydrogen/topology/links.csv"
      stores_path: "data/hydrogen/topology/store.csv"
    coupling:
      method: "nearest_h2_node"          # Electricity-side assets couple to nearest hydrogen node
    capacity_bounds:
      electrolysis: "fes_total"          # Use FES electrolysis totals as the build envelope
      h2_turbine: "fes_generation"       # Use FES hydrogen generation capacity already integrated into the network
      storage_multiplier: 2.0            # Max store expansion = imported e_nom × multiplier
    costs:
      electrolysis_capital_cost: 900.0   # Placeholder annualized capex; override per-scenario if needed
      h2_turbine_capital_cost: 700.0     # Placeholder annualized capex; override per-scenario if needed
      storage_capital_cost: 15.0         # Placeholder annualized capex per MWh_H2

  explicit_demand:
    enabled: false
    annual_demand_twh: 12.0
    profile: "flat"
    nodes_path: "resources/case_studies/scotland_n2h_2035/inputs/explicit_h2_demand_nodes.csv"
    unmet_demand_penalty_gbp_per_mwh: 15000.0

  siting_constraints:
    enabled: true

    electrolysis:
      protected_tiers:                    # Hard exclusion (true) or skip (false) per tier
        tier1: true                       # SAC/SPA/Ramsar/SSSI (excluding marine)
        tier2: true                       # AONB/NatParks/NSA
        tier3: true                       # Irreplaceable habitats
        tier4: true                       # Historic environment
      land_cover:                         # UK LCM 2024 habitat class codes (1–21)
        exclusion_codes: [13, 14, 20, 21] # Saltwater, Freshwater, Urban, Suburban
      flooding:
        enabled: true                     # Flood Zones 2, 3
      coastal_change:
        enabled: true
      groundwater_protection:             # England & Wales only
        exclusion_zones: [1, 2]           # SPZ zones to exclude (1→Band 1)
      airfield:
        mod: true                         # MoD aerodromes FRZ exclusion zone
        civil: true                       # Civil protected aerodromes FRZ exclusion zone
      alc_bmv:
        enabled: true                      # Hard constraint: BMV agricultural land (Grades 1, 2, 3a)
      green_belt:
        enabled: true                      # Hard constraint: Green Belt land (England & Scotland)
      gas_pipe:
        enabled: true
        buffer: 100                        # m — buffer around high-pressure gas pipelines
      comah:
        enabled: true
        buffer: 3000                       # m — buffer around COMAH Upper Tier sites
      capacity_density: 100                # MW/km²

    h2_turbine:
      protected_tiers:                     # Hard exclusion (true) or skip (false) per tier
        tier1: true                        # SAC/SPA/Ramsar/SSSI (excluding marine)
        tier2: true                        # AONB/NatParks/NSA
        tier3: true                        # Irreplaceable habitats
        tier4: true                        # Historic environment
      land_cover:                          # UK LCM 2024 habitat class codes (1–21)
        exclusion_codes: [13, 14, 20, 21]  # Saltwater, Freshwater, Urban, Suburban
      flooding:
        enabled: true                      # Flood Zones 2, 3
      coastal_change:
        enabled: true
      groundwater_protection:              # England & Wales only
        exclusion_zones: [1, 2]            # SPZ zones to exclude (1→Band 1)
      airfield:
        mod: true                          # MoD aerodromes FRZ exclusion zone
        civil: true                        # Civil protected aerodromes FRZ exclusion zone
      alc_bmv:
        enabled: true                      # Hard constraint: BMV agricultural land (Grades 1, 2, 3a)
      green_belt:
        enabled: true                      # Hard constraint: Green Belt land (England & Scotland)
      gas_pipe:
        enabled: true
        buffer: 100                        # m — buffer around high-pressure gas pipelines
      comah:
        enabled: true
        buffer: 3000                       # m — buffer around COMAH Upper Tier sites
      min_site: 0.03                       # min site area sqkm


# ═══════════════════════════════════════════════════════════════════
# TECHNICAL POTENTIAL CONSTRAINTS
# ═══════════════════════════════════════════════════════════════════

technical_potential_constraints:
  enabled: false                    # Scenario-scoped switch: apply land-derived capacity caps before solve
  min_modelled_year: 2025           # Safety: skip if modelled_year < this (historical scenarios)
  supported_network_models: ["zonal"] # Only compatible future Zonal scenarios consume these caps
  csv_path: "resources/land/technical_potential_Zonal.csv"  # Land pipeline output consumed by optimization

# ═══════════════════════════════════════════════════════════════════
# FUTURE CAPACITY CANDIDATES
# ═══════════════════════════════════════════════════════════════════
# Optional rollout mode for future land-linked capacity.
# Existing live assets stay fixed; future FES capacity becomes extendable
# candidate headroom per bus/zone or site/anchor.
#
# Current scope:
# - land-linked renewables use fixed live baseline + extendable candidates
# - future nuclear uses fixed live baseline + extendable large-nuclear / SMR candidates
#
# Technical-potential constraints then tighten those candidates in the policy
# layer instead of only hitting the fixed fleet.

future_capacity_candidates:
  enabled: false
  min_modelled_year: 2025
  supported_network_models: ["zonal"]
  carriers: ["wind_onshore", "wind_offshore", "solar_pv", "nuclear"]
  capital_costs:
    wind_onshore: 1200.0            # Placeholder workflow capex; override per-scenario for research runs
    wind_offshore: 2500.0           # Placeholder workflow capex; override per-scenario for research runs
    solar_pv: 700.0                 # Placeholder workflow capex; override per-scenario for research runs
    nuclear: 8000.0                 # Placeholder large-nuclear capex for future-candidate workflow
    smr: 9500.0                     # Placeholder SMR capex for future-candidate workflow
  nuclear:
    enabled: true
    workbook_paths:
      "2024": "data/FES/Future Energy Scenarios 2024 Data Workbook_V006_0.xlsx"
      "2025": "data/FES/Future Energy Scenarios 2025 Data Workbook V005_0.xlsx"
    en6_sites_path: "data/generators/nuclear_en6_sites.csv"
    smr_anchors_path: "data/generators/smr_demand_anchors.csv"
    smr_demand_weights:
      electricity: 1.0
      gas: 1.0

# ═══════════════════════════════════════════════════════════════════
# SCOTLAND — Zone Classification
# ═══════════════════════════════════════════════════════════════════

scotland:
  zones: ["Z1_1", "Z1_2", "Z1_3", "Z1_4", Z2, Z3, Z4, Z5, Z6]  # Zonal network IDs for Scottish zones

# ═══════════════════════════════════════════════════════════════════
# CARBON BUDGET — Emission Constraints
# ═══════════════════════════════════════════════════════════════════
# Per-period CO₂e limits aligned with UK's 7th Carbon Budget.
# This config surface is retained for future solve-time policy work, but the
# current solve hook does NOT yet enforce a carbon-budget constraint.
# Values are annual limits in MtCO₂e and can still be used as planning inputs.
# The carbon_price in defaults.yaml remains the active economic signal today.

carbon_budget:
  enabled: true                   # Set false to disable emission constraints entirely
  # Annual CO₂e limits by modelled year (MtCO₂e/yr)
  # Based on UK 7th Carbon Budget trajectory to net zero by 2050
  # These can be overridden per-scenario in scenarios.yaml
  annual_limits:
    2030: 230                     # ~6th Carbon Budget period (2033-2037 avg ≈ 190 MtCO₂e)
    2035: 140                     # Between 6th and 7th budget periods
    2040: 75                      # 7th Carbon Budget period (2038-2042)
    2045: 30                      # Approaching net zero
    2050: 0                       # Net zero target year

# ──────────────────────────────────────────────────────────────────────────────
# MARGINAL COST DEFAULTS (for future scenarios, modelled_year > 2024)
# ──────────────────────────────────────────────────────────────────────────────
# Historical scenarios (≤2024) automatically use built-in historical lookup tables
# Future scenarios (>2024) use these defaults unless overridden in scenarios.yaml
# ──────────────────────────────────────────────────────────────────────────────

marginal_costs:
  # Carbon price (£/tonne CO2)
  carbon_price: 85.0

  # Fuel prices (£/MWh thermal, before efficiency adjustment)
  fuel_prices:
    gas: 35.0          # Natural gas (CCGT/OCGT)
    coal: 30.0         # Coal
    oil: 75.0          # Oil
    biomass: 45.0      # Biomass/bioenergy
    nuclear: 8.0       # Very low marginal operating cost
    hydro: 5.0         # Very low marginal cost
    wind: 0.5          # Minimal variable O&M
    solar: 0.5         # Minimal variable O&M
    battery: 0.1       # Wear and tear cost

  # Historical data: Built-in lookup tables (2010-2024) used automatically
  # for historical scenarios. Cannot be overridden to maintain accuracy.
  use_historical_data: true

  # FES dynamic prices: For future scenarios (>2024), use FES-extracted prices if available
  # Falls back to defaults above if FES extraction not available
  use_fes_prices: true

# ──────────────────────────────────────────────────────────────────────────────
# SOLVER CONFIGURATION
# ──────────────────────────────────────────────────────────────────────────────
solver:
  name: "gurobi"                  # Options: gurobi, highs, glpk, cplex
  threads: 0                      # 0=use all threads made available to the solve rule at runtime
  method: 2                       # 0=primal, 1=dual, 2=barrier
  crossover: 0                    # 0=disabled (faster), -1=auto (enables crossover)
  BarHomogeneous: 1               # 1=enable homogeneous barrier (handles numerical issues)
  BarConvTol: 1.e-5
  FeasibilityTol: 1.e-5           # Relaxed from 1.e-6 for numerical stability
  OptimalityTol: 1.e-5            # Relaxed from 1.e-6 for numerical stability
  NumericFocus: 2                 # 0-3, higher = more careful numerics (2=moderate)
  ScaleFlag: 2                    # 0-3, automatic scaling (2=aggressive)
  DualReductions: 0               # 0=disable (clearer error messages)

# ──────────────────────────────────────────────────────────────────────────────
# MARKET / ECONOMIC DIAGNOSTICS
# ──────────────────────────────────────────────────────────────────────────────
# The core model remains a least-cost system optimisation. These settings add
# transparent post-processing and optional, disabled-by-default sensitivity hooks
# for market-style interpretation.
market:
  curtailment_payments:
    enabled: false
    # Use 0 for physical curtailment only; 40 and 80 GBP/MWh are the first
    # moderate/high post-processing sensitivities for constraint-payment exposure.
    default_gbp_per_mwh: 0.0
    carrier_gbp_per_mwh: {}
  objective_sensitivity:
    enabled: false
    renewable_marginal_cost_adder_gbp_per_mwh: 0.0
    carrier_marginal_cost_adders_gbp_per_mwh: {}
    eligible_carriers:
      - wind_onshore
      - wind_offshore
      - solar_pv
      - solar
      - offwind-fixed-ac
      - offwind-fixed-dc
      - offwind-float-ac
      - offwind-float-dc
      - tidal_stream
      - shoreline_wave

# ──────────────────────────────────────────────────────────────────────────────
# OPTIMIZATION MODE
# ──────────────────────────────────────────────────────────────────────────────
# LP (Linear Programming):    Fast (~minutes), no unit commitment
# MILP (Mixed-Integer LP):    Slow (~hours), full unit commitment constraints
solve_mode: "LP"                # Options: "LP" or "MILP"

# ──────────────────────────────────────────────────────────────────────────────
# SOLVE PERIOD (full year by default)
# ──────────────────────────────────────────────────────────────────────────────
solve_period:
  enabled: false                  # Set true to solve subset of year

# ──────────────────────────────────────────────────────────────────────────────
# LOGGING
# ──────────────────────────────────────────────────────────────────────────────

logging:
  level: "INFO"                     # DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_to_file: true
  log_directory: "logs"
