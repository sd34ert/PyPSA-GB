# ╔════════════════════════════════════════════════════════════════════════════╗
# ║ FUTURE SCENARIOS (modelled_year > 2024)                                    ║
# ║ Uses: FES (Future Energy Scenarios) projections                            ║
# ║ FES_year + FES_scenario are REQUIRED for future scenarios                  ║
# ╚════════════════════════════════════════════════════════════════════════════╝

HT35:
  description: "FES 2025 Holistic Transition 2035 - Full ETYS"
  modelled_year: 2035
  FES_year: 2025
  FES_scenario: "Holistic Transition"
  renewables_year: 2020           # Weather proxy year
  demand_year: 2020               # Demand baseline (scaled to 2035)
  network_model: "ETYS"
  solve_period:
    enabled: true
    start: "2035-01-01 00:00"
    end: "2035-01-01 01:00"

HT35_flex:
  description: "FES 2025 Holistic Transition 2035 - Full ETYS with EV flexibility"
  modelled_year: 2035
  FES_year: 2025
  FES_scenario: "Holistic Transition"
  renewables_year: 2020           # Weather proxy year
  demand_year: 2020               # Demand baseline (scaled to 2035)
  network_model: "ETYS"
  solve_period:
    enabled: true
    start: "2035-04-25 00:00"
    end: "2035-05-08 23:00"
  demand_disaggregation:
    enabled: true
    components:
      - name: "electric_vehicles"
        allocation_method: "fes_gsp"
        use_fes_fraction: true
  demand_flexibility:
    enabled: true
    heat_pumps:
      enabled: false
    electric_vehicles:
      enabled: false
    event_response:
      enabled: true
      event_window: ["17:00", "19:00"]  # Realistic 2-hour evening peak window
      marginal_cost: 40.0               # Competitive with storage+interconnectors
  clustering: 
    preset: gsp_spatial
  component_aggregation:
    enabled: true
    include_storage_units: true
    include_loads: true

HT30_event_response:
  description: "FES 2025 Holistic Transition 2030 - clustered ETYS with event response flexibility"
  modelled_year: 2030
  FES_year: 2025
  FES_scenario: "Holistic Transition"
  renewables_year: 2013           # Weather proxy year
  demand_year: 2013               # Demand baseline (scaled to 2030)
  network_model: "ETYS"
  solve_period:
    enabled: true
    start: "2030-02-21 00:00"
    end: "2030-03-07 23:00"
  demand_disaggregation:
    enabled: false
    components:
      - name: "electric_vehicles"
        allocation_method: "fes_gsp"
        use_fes_fraction: true
  demand_flexibility:
    enabled: true
    heat_pumps:
      enabled: false
    electric_vehicles:
      enabled: false
    event_response:
      enabled: true
      event_window: ["17:00", "19:00"]  # Realistic 2-hour evening peak window
      marginal_cost: 40.0               # Competitive with storage+interconnectors
  clustering: 
    preset: kmeans_10
  component_aggregation:
    enabled: true
    include_storage_units: true
    include_loads: true

HT35_year:
  description: "FES 2025 Holistic Transition 2035 - Full ETYS (1 year)"
  modelled_year: 2035
  FES_year: 2025
  FES_scenario: "Holistic Transition"
  renewables_year: 2013           # Weather proxy year
  demand_year: 2013               # Demand baseline (scaled to 2035)
  network_model: "ETYS"
  clustering:
    method: kmeans
    n_clusters: 20
  component_aggregation:
    enabled: true
    include_storage_units: true
    include_loads: true
  solve_period:
    enabled: true
    start: "2035-01-01 00:00"
    end: "2035-12-31 23:00"

HT35_without_network_upgrades:
  description: "FES 2025 Holistic Transition 2035 - Full ETYS with Network Upgrades"
  modelled_year: 2035
  FES_year: 2025
  FES_scenario: "Holistic Transition"
  renewables_year: 2020           # Weather proxy year
  demand_year: 2020               # Demand baseline (scaled to 2035)
  network_model: "ETYS"
  etys_upgrades:
    enabled: false                 # Apply ETYS network upgrades
    upgrade_year: null            # null = use modelled_year (2035)
  solve_period:
    enabled: true
    start: "2035-01-01 00:00"
    end: "2035-01-07 23:00"

