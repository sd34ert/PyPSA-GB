HT35_zonal_h2_scotland_base:
  description: "FES 2025 Holistic Transition 2035 - Scotland-focused base case with 12.0 TWh explicit Scottish H2 demand as the working central case rounded from the Table 4.1 hub-based reference scale in a GB-integrated zonal electricity-hydrogen model"
  modelled_year: 2035
  FES_year: 2025
  FES_scenario: "Holistic Transition"
  renewables_year: 2020
  demand_year: 2015
  network_model: "Zonal"
  solver:
    threads: 0
    method: 1
  solve_period:
    enabled: false
  future_capacity_candidates:
    enabled: true
  technical_potential_constraints:
    enabled: true
  hydrogen:
    network:
      mode: "full"
    explicit_demand:
      enabled: true
      annual_demand_twh: 12.0
      profile: "flat"
      nodes_path: "resources/case_studies/scotland_n2h_2035/inputs/explicit_h2_demand_nodes.csv"
      unmet_demand_penalty_gbp_per_mwh: 15000.0
  nuclear:
    future_fixed:
      exclude_scotland: true
    siting_constraints:
      large_nuclear:
        scotland_ban: true
      smr:
        scotland_ban: true
        allowed_anchor_ids: []
  nuclear_to_x:
    enabled: true

